<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Práctica</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card">
        <div class="card-header">
            <h3>Registrar Práctica Profesional</h3>
        </div>

        <div class="card-body">

            <form id="formPractica">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Id Estudiante</label>
                        <input type="number" class="form-control" id="id_estudiante" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Id Institución</label>
                        <input type="number" class="form-control" id="id_institucion" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Fecha Inicio</label>
                        <input type="date" class="form-control" id="fecha_inicio" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Fecha Fin</label>
                        <input type="date" class="form-control" id="fecha_fin">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Estado</label>
                        <select class="form-control" id="estado">
                            <option>Pendiente</option>
                            <option>En Proceso</option>
                            <option>Finalizada</option>
                            <option>Cancelada</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Modalidad</label>
                        <select class="form-control" id="modalidad">
                            <option>Curricular</option>
                            <option>Extracurricular</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Remuneración</label>
                        <select class="form-control" id="remuneracion">
                            <option>Remunerada</option>
                            <option>No Remunerada</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Tipo Práctica</label>
                        <select class="form-control" id="tipo_practica">
                            <option>Pasantia</option>
                            <option>Trainee</option>
                            <option>Investigacion</option>
                            <option>Comunitaria</option>
                            <option>Organizacional</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Horas Requeridas</label>
                        <input type="number" class="form-control" id="horas_requeridas" value="240">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Horas Completadas</label>
                        <input type="number" class="form-control" id="horas_completadas" value="0">
                    </div>

                    <div class="col-md-12 mb-3">
                        <label>Área de Trabajo</label>
                        <input type="text" class="form-control" id="area_trabajo">
                    </div>

                    <div class="col-md-12 mb-3">
                        <label>Descripción</label>
                        <textarea class="form-control" id="descripcion"></textarea>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary">
                    Registrar
                </button>

                <a class="btn btn-secondary mt-3" href="/informacion_practicas">Volver</a>

            </form>

        </div>
    </div>

</div>

<script>

document.getElementById("formPractica").addEventListener("submit", async function(e){

    e.preventDefault();

    const datos = {
        id_estudiante: parseInt(document.getElementById("id_estudiante").value),
        id_institucion: parseInt(document.getElementById("id_institucion").value),
        fecha_inicio: document.getElementById("fecha_inicio").value,
        fecha_fin: document.getElementById("fecha_fin").value,
        estado: document.getElementById("estado").value,
        modalidad: document.getElementById("modalidad").value,
        remuneracion: document.getElementById("remuneracion").value,
        tipo_practica: document.getElementById("tipo_practica").value,
        horas_requeridas: parseInt(document.getElementById("horas_requeridas").value),
        horas_completadas: parseInt(document.getElementById("horas_completadas").value),
        area_trabajo: document.getElementById("area_trabajo").value,
        descripcion: document.getElementById("descripcion").value
    };

    const respuesta = await fetch('/practicas', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(datos)
    });

    const resultado = await respuesta.json();

    alert(resultado.mensaje);

    document.getElementById("formPractica").reset();
});

</script>

</body>
</html>
