<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prácticas Profesionales</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            padding:30px;
        }

        h1{
            text-align:center;
        }

        table{
            width:100%;
            border-collapse: collapse;
            background:white;
        }

        th{
            background:#0066cc;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            border:1px solid #ddd;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f9f9f9;
        }
    </style>
</head>
<body>

<h1>Estado de Prácticas Profesionales</h1>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Estudiante</th>
            <th>Institución</th>
            <th>Estado</th>
            <th>Horas</th>
            <th>Avance</th>
        </tr>
    </thead>

    <tbody id="tabla"></tbody>

<script>
async function cargarPracticas() {

    const token = localStorage.getItem("token");

    const res = await fetch("/api/practicas", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (!res.ok) {
        alert("No autorizado");
        return;
    }

    const data = await res.json();

    let html = "";

    data.forEach(p => {
        html += `
        <tr>
            <td>${p.id}</td>
            <td>${p.estudiante}</td>
            <td>${p.institucion}</td>
            <td>${p.estado}</td>
            <td>${p.horas}</td>
            <td>${p.avance}%</td>
        </tr>
        `;
    });

    document.getElementById("tabla").innerHTML = html;
}

cargarPracticas();
</script>
</table>

</body>
</html>
