<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SGPP{% endblock %}</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='index.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='tabla.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.dataTables.min.css"
    />
  </head>

  <body>
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <i class="ti ti-building-community"></i>
        </div>

        <div>
          <div class="logo-title">Prácticas Profesionales</div>

          <div class="logo-sub">Sistema de control</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Principal</div>

        <a
          href="/"
          class="nav-item {% if request.path == '/' %}active{% endif %}"
        >
          <i class="ti ti-layout-dashboard"></i>
          Dashboard
        </a>

        <a
          href="/informacion_practicas"
          class="nav-item {% if request.path == '/informacion_practicas' %}active{% endif %}"
        >
          <i class="ti ti-file-text"></i>
          Prácticas Profesionales
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar">AM</div>

          <div style="flex: 1">
            <div class="user-name">Ana Morales</div>

            <div class="user-role">Coordinadora</div>
          </div>
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-breadcrumb">
          <span>Sistema</span>

          <i class="ti ti-chevron-right"></i>

          <span class="current">
            {% block pagina %} Dashboard {% endblock %}
          </span>
        </div>

        <div class="topbar-actions">
          <div class="period-btn">
            <i class="ti ti-power"></i>
            Cerrar sesión
          </div>
        </div>
      </header>

      <main class="content">{% block contenido %} {% endblock %}</main>
    </div>
  </body>

  <script
    src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"
  ></script>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>
</html>
